<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://kit.fontawesome.com/367c7538d3.js" crossorigin="anonymous"></script>
    <style>
      body{
        background-color: oklch(20.5% 0 0);
      }
    </style>
  </head>
  <body>
    <nav class="bg-amber-400 flex justify-center gap-10 mt-2 h-20 items-center">
      <div class="py-5 pl-2 w-48">
        <a class="text-3xl font-sans font-bold border-4 px-2 pb-1 rounded-xl">CS.STORE</a>
      </div>
      <div class="hidden md:flex">
        <!-- <a class="fa-solid fa-bars text-blue-900 text-3xl md:hidden"></a> -->
        <div class="p-5">
          <a class="px-5 text-shadow-lg/30" href="/index.html">Inicio</a>
          <a class="px-5 text-shadow-lg/30" href="./card_view.html">Tienda</a>
          <a class="px-5 text-shadow-lg/30">Pedidos</a>
          <a class="px-5 text-shadow-lg/30">Sobre</a>
          
        </div>
        <div class="p-5 ml-10 block">
          <a class="px-6 py-1 pb-1.5 bg-zinc-800 text-white rounded-l-lg">Login</a>
          <a class="px-4 py-1 pb-1.5 bg-zinc-800 text-white rounded-r-lg">Register</a>
        </div>
      </div>
    </nav>

    <div class="mt-40">
      <form class="max-w-md mx-auto font-semibold border-2 border-amber-400 p-6 bg-zinc-800 rounded-xl">
        <div class="text-center py-2 mb-6">
          <label class="text-3xl text-zinc-400">Inicia sesión</label>
        </div>
        <div class="mb-6">
          <label class="block text-white text-xl mb-2">Ingrese su correo:</label>
          <input type="email" class="bg-zinc-600 w-full px-2 py-2 rounded-lg" placeholder="nombre@example.com" id="user">
        </div>
        <div class="mb-5">
          <label class="block text-white text-xl mb-2">Ingrese su contraseña:</label>
          <input type="password" class="bg-zinc-500 w-full px-2 py-2 rounded-lg" placeholder="••••••••" id="password">
        </div>
        <div class="flex justify-between mt-8 mb-4">
          <a href="" class="mt-1 text-lg text-amber-400 hover:text-amber-600">Recuperar contraseña.</a>
          <!-- <a type="submit" class="bg-amber-400 px-3 py-1 rounded-xl border-2 border-amber-500 hover:bg-amber-500">Ingresar</a> -->
          <button type="button" class="bg-amber-400 px-3 py-1 rounded-xl border-2 border-amber-500 hover:bg-amber-500" id="login" style="cursor: pointer;">Ingresar</button>
          
        </div>
      </form>
    </div>

    <script src="/scripts/login.js"></script>
  </body>
</html>
